<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spendda — Marketing UI kit</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  :root { color-scheme: dark; }
  body { font-family: "Geist", "Inter", ui-sans-serif, system-ui, sans-serif; }
  @keyframes spendda-fade-in-up { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: none; } }
  .motion-safe\\:animate-fade-in-up, .motion-safe\:animate-fade-in-up { animation: spendda-fade-in-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
</style>
</head>
<body id="top" class="min-h-screen bg-slate-950 text-white antialiased">
<div class="pointer-events-none fixed inset-0 -z-10" style="background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(37,99,235,0.2), transparent 50%), radial-gradient(circle at 100% 0%, rgba(16,185,129,0.1), transparent 35%), linear-gradient(180deg, #020617 0%, #030b18 55%, #020617 100%);"></div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections1.jsx"></script>
<script type="text/babel" src="Sections2.jsx"></script>
<script type="text/babel" src="LoginDrawer.jsx"></script>

<script type="text/babel">
function App() {
  const [loginOpen, setLoginOpen] = React.useState(false);
  return (
    <>
      <window.Nav onLogin={() => setLoginOpen(true)} />
      <main>
        <window.Hero />
        <window.TrustedBy />
        <window.Solutions />
        <window.HowItWorks />
        <window.ROI />
        <window.Integrations />
        <window.Pricing />
        <window.TrustCenter />
        <window.FAQ />
        <window.FinalCta />
      </main>
      <window.Footer />
      <window.LoginDrawer open={loginOpen} onClose={() => setLoginOpen(false)} />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
