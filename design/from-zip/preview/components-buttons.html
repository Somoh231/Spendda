<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
  <button style="height:44px;padding:0 24px;border-radius:999px;border:none;background:linear-gradient(90deg,#3b82f6,#60a5fa);color:#fff;font:600 14px Geist;box-shadow:0 14px 44px rgba(37,99,235,0.35);cursor:pointer">Book a live walkthrough →</button>
  <button style="height:44px;padding:0 24px;border-radius:999px;border:1px solid rgba(15,23,42,0.15);background:rgba(15,23,42,0.04);color:#0b1220;font:600 14px Geist;cursor:pointer">Explore the platform</button>
  <button style="height:36px;padding:0 14px;border-radius:10px;border:none;background:hsl(217 91% 53%);color:#fff;font:500 13px Geist;box-shadow:0 1px 2px rgba(15,23,42,0.12);cursor:pointer">Primary</button>
  <button style="height:36px;padding:0 14px;border-radius:10px;border:1px solid rgba(15,23,42,0.15);background:#fff;color:#0b1220;font:500 13px Geist;cursor:pointer">Outline</button>
  <button style="height:36px;padding:0 14px;border-radius:10px;border:1px solid rgba(15,23,42,0.06);background:#eef2f7;color:#0b1220;font:500 13px Geist;cursor:pointer">Secondary</button>
  <button style="height:36px;padding:0 14px;border-radius:10px;border:none;background:transparent;color:#0b1220;font:500 13px Geist;cursor:pointer">Ghost</button>
</div>
</body></html>
