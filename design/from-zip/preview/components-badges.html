<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 10px;border-radius:999px;background:#3b82f6;color:#fff;font:600 11px Geist">Primary</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 10px;border-radius:999px;background:#eef2f7;color:#0b1220;font:600 11px Geist">Secondary</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 10px;border-radius:999px;background:rgba(220,38,38,0.1);color:#b91c1c;border:1px solid rgba(220,38,38,0.2);font:600 11px Geist">High</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 10px;border-radius:999px;background:rgba(245,158,11,0.15);color:#b45309;border:1px solid rgba(245,158,11,0.25);font:600 11px Geist">Medium</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 10px;border-radius:999px;border:1px solid rgba(15,23,42,0.15);color:#0b1220;font:600 11px Geist">Low</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px;border-radius:999px;border:1px solid rgba(59,130,246,0.35);background:rgba(59,130,246,0.10);color:#1e3a8a;font:600 10.5px Geist;letter-spacing:0.05em;text-transform:uppercase">
    <span style="width:6px;height:6px;border-radius:999px;background:#16a34a"></span>
    Data health strong
  </span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px;border-radius:999px;border:1px solid rgba(16,185,129,0.28);background:rgba(16,185,129,0.1);color:#065f46;font:600 10.5px Geist;letter-spacing:0.05em;text-transform:uppercase">
    <span style="width:6px;height:6px;border-radius:999px;background:#10b981"></span>
    +12% WoW
  </span>
</div>
</body></html>
