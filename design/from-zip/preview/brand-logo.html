<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card dark" style="background:linear-gradient(180deg,#020617,#030b18)">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.18);box-shadow:0 12px 40px rgba(37,99,235,0.22)">
      <img src="../assets/spendda-logo.png" style="width:32px;height:32px;object-fit:contain"/>
    </div>
    <div>
      <div style="font:600 15px Geist;color:#fff;letter-spacing:-0.01em">Spendda</div>
      <div style="font:500 10.5px Geist;color:#64748b;text-transform:uppercase;letter-spacing:0.14em">Spend + payroll intelligence</div>
    </div>
  </div>
  <div style="margin-top:16px;display:flex;gap:14px;align-items:center">
    <div style="width:56px;height:56px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.22);box-shadow:0 12px 40px rgba(59,130,246,0.35)">
      <img src="../assets/spendda-logo.png" style="width:52px;height:52px;object-fit:contain"/>
    </div>
    <div style="width:72px;height:72px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.22);box-shadow:0 16px 50px rgba(37,99,235,0.3)">
      <img src="../assets/spendda-logo.png" style="width:64px;height:64px;object-fit:contain"/>
    </div>
    <div style="color:#94a3b8;font-size:11px;max-width:360px;line-height:1.5">
      Always on a white plate. Never bare on dark. Plate rounding uses the <span class="mono">rounded-xl</span> (12 px) in nav, <span class="mono">rounded-2xl</span> (16 px) in sidebar.
    </div>
  </div>
</div>
</body></html>
