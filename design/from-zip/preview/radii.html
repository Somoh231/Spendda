<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px">
    <div><div style="height:48px;background:#e2e8f0;border:1px solid rgba(15,23,42,0.08);border-radius:6px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">xs · 6</div></div>
    <div><div style="height:48px;background:#e2e8f0;border:1px solid rgba(15,23,42,0.08);border-radius:8px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">sm · 8</div></div>
    <div><div style="height:48px;background:#e2e8f0;border:1px solid rgba(15,23,42,0.08);border-radius:10px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">md · 10</div></div>
    <div><div style="height:48px;background:#e2e8f0;border:1px solid rgba(15,23,42,0.08);border-radius:14px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">lg · 14</div></div>
    <div><div style="height:48px;background:#e2e8f0;border:1px solid rgba(15,23,42,0.08);border-radius:16px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">2xl · 16</div></div>
    <div><div style="height:48px;background:#3b82f6;border-radius:999px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">pill · ∞</div></div>
  </div>
  <div class="muted" style="margin-top:10px;font-size:11px">Cards: <span class="mono">2xl</span>. CTAs + chips: <span class="mono">pill</span>. Logos: <span class="mono">xl</span>.</div>
</div>
</body></html>
