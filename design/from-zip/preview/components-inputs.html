<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div>
      <label style="font:500 12px Geist;color:#0b1220">Email</label>
      <input placeholder="name@org.gov" style="display:block;margin-top:6px;height:36px;width:100%;border:1px solid rgba(15,23,42,0.15);border-radius:10px;padding:0 12px;font:400 13px Geist;background:rgba(255,255,255,0.5);box-shadow:0 1px 0 rgba(15,23,42,0.05)">
      <div class="muted" style="margin-top:6px;font-size:11px">h-9, rounded-lg, bg-background/50, ring on focus.</div>
    </div>
    <div>
      <label style="font:500 12px Geist;color:#0b1220">Entity</label>
      <div style="display:block;margin-top:6px;height:36px;width:100%;border:1px solid rgba(15,23,42,0.15);border-radius:10px;padding:0 12px;font:400 13px Geist;background:#fff;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 0 rgba(15,23,42,0.05)">
        <span>HQ</span><span class="muted">▾</span>
      </div>
      <div class="muted" style="margin-top:6px;font-size:11px">Select — border-border/70 bg-card/80.</div>
    </div>
  </div>
</div>
</body></html>
