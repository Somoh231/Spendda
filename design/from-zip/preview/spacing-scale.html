<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;align-items:end">
    <div><div style="height:4px;background:#3b82f6;border-radius:2px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">1 · 4px</div></div>
    <div><div style="height:8px;background:#3b82f6;border-radius:2px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">2 · 8</div></div>
    <div><div style="height:12px;background:#3b82f6;border-radius:2px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">3 · 12</div></div>
    <div><div style="height:16px;background:#3b82f6;border-radius:2px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">4 · 16</div></div>
    <div><div style="height:24px;background:#3b82f6;border-radius:2px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">6 · 24</div></div>
    <div><div style="height:32px;background:#3b82f6;border-radius:2px"></div><div class="mono muted" style="margin-top:6px;font-size:10.5px">8 · 32</div></div>
  </div>
  <div class="muted" style="margin-top:12px;font-size:11px">4 px base. <span class="mono">--ds-page-y 24</span> · <span class="mono">--ds-section-y 40</span>.</div>
</div>
</body></html>
