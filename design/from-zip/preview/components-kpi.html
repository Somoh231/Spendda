<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div style="padding:14px;border:1px solid rgba(15,23,42,0.08);border-radius:14px;background:#fff">
      <div class="caption" style="color:#64748b">Total spend · 30d</div>
      <div class="mono" style="font-size:26px;font-weight:600;margin-top:4px">$4.82M</div>
      <div style="display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:2px 8px;border-radius:999px;background:rgba(16,185,129,0.1);color:#047857;border:1px solid rgba(16,185,129,0.25);font:600 11px Geist">+2.4%</div>
    </div>
    <div style="padding:14px;border:1px solid rgba(15,23,42,0.08);border-radius:14px;background:#fff">
      <div class="caption" style="color:#64748b">Payroll · monthly</div>
      <div class="mono" style="font-size:26px;font-weight:600;margin-top:4px">$1.14M</div>
      <div style="display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:2px 8px;border-radius:999px;background:rgba(220,38,38,0.1);color:#b91c1c;border:1px solid rgba(220,38,38,0.22);font:600 11px Geist">−3.1%</div>
    </div>
    <div style="padding:14px;border:1px solid rgba(15,23,42,0.08);border-radius:14px;background:#fff">
      <div class="caption" style="color:#64748b">Flags · 30d</div>
      <div class="mono" style="font-size:26px;font-weight:600;margin-top:4px">12</div>
      <div class="muted" style="margin-top:6px;font-size:11px">1 high · 4 medium · 7 low</div>
    </div>
  </div>
</div>
</body></html>
