<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css" /></head>
<body style="padding:8px">
<div class="card" style="background:#f8fafc">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div style="padding:14px;background:#fff;border-radius:12px;box-shadow:0 1px 0 rgba(15,23,42,0.05)">
      <div style="font-weight:600;font-size:13px">xs / sm</div>
      <div class="muted" style="font-size:11px;margin-top:2px">hairline + 1-2 px drop</div>
    </div>
    <div style="padding:14px;background:#fff;border-radius:14px;box-shadow:0 4px 14px -2px rgba(15,23,42,0.10),0 1px 2px rgba(15,23,42,0.06)">
      <div style="font-weight:600;font-size:13px">md</div>
      <div class="muted" style="font-size:11px;margin-top:2px">menus, toasts</div>
    </div>
    <div style="padding:14px;background:#fff;border-radius:16px;box-shadow:0 1px 0 rgba(15,23,42,0.04),0 14px 40px -12px rgba(15,23,42,0.10)">
      <div style="font-weight:600;font-size:13px">card</div>
      <div class="muted" style="font-size:11px;margin-top:2px">the product default</div>
    </div>
  </div>
  <div style="margin-top:14px;padding:14px;background:#fff;border-radius:16px;box-shadow:0 1px 0 rgba(15,23,42,0.05),0 20px 50px -12px rgba(37,99,235,0.18)">
    <div style="font-weight:600;font-size:13px">card-hover</div>
    <div class="muted" style="font-size:11px;margin-top:2px">blue-tinted glow on hover — the signature lift</div>
  </div>
</div>
</body></html>
