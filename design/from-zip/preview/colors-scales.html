<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div>
      <div class="caption">Risk</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(0 72% 51%)"></div>
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(38 92% 50%)"></div>
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(142 71% 41%)"></div>
      </div>
      <div class="muted" style="margin-top:6px;font-size:10.5px">High / Medium / Low</div>
    </div>
    <div>
      <div class="caption">Confidence</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(142 71% 41%)"></div>
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(38 92% 50%)"></div>
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(0 72% 51%)"></div>
      </div>
      <div class="muted" style="margin-top:6px;font-size:10.5px">High / Medium / Low</div>
    </div>
    <div>
      <div class="caption">Chart</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(217 91% 55%)"></div>
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(142 71% 45%)"></div>
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(38 92% 50%)"></div>
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(215 16% 52%)"></div>
        <div style="flex:1;height:40px;border-radius:8px;background:hsl(222 47% 28%)"></div>
      </div>
      <div class="muted" style="margin-top:6px;font-size:10.5px">chart-1 → chart-5</div>
    </div>
  </div>
</div>
</body></html>
