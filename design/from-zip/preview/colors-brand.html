<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <!-- Primary blue -->
    <div>
      <div style="height:56px;border-radius:10px;background:#3b82f6;box-shadow:inset 0 1px 0 rgba(255,255,255,0.18)"></div>
      <div style="margin-top:8px;font-weight:600;font-size:13px">Primary</div>
      <div class="mono muted" style="font-size:11px">#3b82f6</div>
      <div class="muted" style="font-size:10.5px">hsl 217 91% 53%</div>
    </div>
    <div>
      <div style="height:56px;border-radius:10px;background:#22c55e"></div>
      <div style="margin-top:8px;font-weight:600;font-size:13px">Accent</div>
      <div class="mono muted" style="font-size:11px">#22c55e</div>
      <div class="muted" style="font-size:10.5px">hsl 142 71% 41%</div>
    </div>
    <div>
      <div style="height:56px;border-radius:10px;background:#081225"></div>
      <div style="margin-top:8px;font-weight:600;font-size:13px">Navy</div>
      <div class="mono muted" style="font-size:11px">#081225</div>
      <div class="muted" style="font-size:10.5px">--spendda-navy</div>
    </div>
    <div>
      <div style="height:56px;border-radius:10px;background:#e2e8f0;border:1px solid rgba(15,23,42,0.08)"></div>
      <div style="margin-top:8px;font-weight:600;font-size:13px">Secondary</div>
      <div class="mono muted" style="font-size:11px">#e2e8f0</div>
      <div class="muted" style="font-size:10.5px">--brand-secondary</div>
    </div>
  </div>
</div>
</body></html>
