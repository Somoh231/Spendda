<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card dark" style="background:#020617;background-image:radial-gradient(ellipse 120% 80% at 50% -20%,rgba(37,99,235,0.22),transparent 50%),radial-gradient(circle at 100% 0%,rgba(16,185,129,0.12),transparent 35%)">
  <div class="caption" style="color:#94a3b8">Dark canvas — marketing</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px">
    <div>
      <div style="height:44px;border-radius:8px;background:#020617;border:1px solid rgba(255,255,255,0.1)"></div>
      <div class="mono" style="font-size:10.5px;margin-top:6px;color:#94a3b8">slate-950</div>
    </div>
    <div>
      <div style="height:44px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.1)"></div>
      <div class="mono" style="font-size:10.5px;margin-top:6px;color:#94a3b8">white/2</div>
    </div>
    <div>
      <div style="height:44px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12)"></div>
      <div class="mono" style="font-size:10.5px;margin-top:6px;color:#94a3b8">white/4</div>
    </div>
    <div>
      <div style="height:44px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14)"></div>
      <div class="mono" style="font-size:10.5px;margin-top:6px;color:#94a3b8">white/6</div>
    </div>
    <div>
      <div style="height:44px;border-radius:8px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.35)"></div>
      <div class="mono" style="font-size:10.5px;margin-top:6px;color:#bfdbfe">blue/12</div>
    </div>
  </div>
  <div style="margin-top:14px;font-size:11px;color:#94a3b8">Tint-over-black tiles — the signature Spendda surface ladder.</div>
</div>
</body></html>
