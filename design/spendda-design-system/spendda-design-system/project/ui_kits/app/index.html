<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spendda — App UI kit</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  :root { color-scheme: dark; }
  /* colors_and_type.css stores tokens as bare HSL triples — wrap each in hsl(...) here */
  html, body { background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: "Geist", "Inter", ui-sans-serif, system-ui, sans-serif; }

  .text-foreground { color: hsl(var(--foreground)); }
  .text-muted-foreground { color: hsl(var(--muted-foreground)); }
  .bg-background { background-color: hsl(var(--background)); }
  .bg-card { background-color: hsl(var(--card)); }
  .bg-card\/70 { background-color: hsl(var(--card) / 0.7); }
  .bg-card\/80 { background-color: hsl(var(--card) / 0.8); }
  .bg-card\/90 { background-color: hsl(var(--card) / 0.9); }
  .bg-muted\/20 { background-color: hsl(var(--muted) / 0.2); }
  .bg-muted\/30 { background-color: hsl(var(--muted) / 0.3); }
  .bg-muted\/40 { background-color: hsl(var(--muted) / 0.4); }
  .bg-muted\/50 { background-color: hsl(var(--muted) / 0.5); }
  .border-border { border-color: hsl(var(--border)); }
  .border-border\/60 { border-color: hsl(var(--border) / 0.6); }
  .border-border\/65 { border-color: hsl(var(--border) / 0.65); }
  .border-border\/70 { border-color: hsl(var(--border) / 0.7); }

  /* focus-within ring for the AI Workspace input */
  .focus-within\:ring-\[var\(--spendda-blue\)\]\/25:focus-within { box-shadow: 0 0 0 2px rgba(59,130,246,0.25); }
</style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopNav.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="AiWorkspace.jsx"></script>
<script type="text/babel" src="Views.jsx"></script>

<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState("dashboard");
  const [theme, setTheme] = React.useState("dark");
  React.useEffect(() => { document.documentElement.classList.toggle("dark", theme === "dark"); }, [theme]);

  let view;
  if (route === "dashboard") view = <window.Dashboard />;
  else if (route === "ai-workspace") view = <window.AiWorkspace />;
  else if (route === "uploads") view = <window.Uploads />;
  else if (route === "alerts") view = <window.Alerts />;
  else view = (
    <div className="grid h-[calc(100vh-4rem)] place-items-center p-10">
      <div className="max-w-md rounded-2xl border border-border/60 bg-card p-8 text-center">
        <div className="text-[10px] font-semibold uppercase tracking-[0.2em] text-muted-foreground">Placeholder</div>
        <div className="mt-2 text-lg font-semibold capitalize">{route.replace("-", " ")}</div>
        <p className="mt-2 text-sm text-muted-foreground">This route is scaffolded in the nav — the Dashboard, AI Workspace, Uploads, and Alerts views are the four built out here.</p>
        <button onClick={() => setRoute("dashboard")} className="mt-4 rounded-full bg-[var(--spendda-blue)] px-4 py-2 text-sm font-semibold text-white">Back to Dashboard</button>
      </div>
    </div>
  );

  return (
    <div className="flex min-h-screen">
      <window.Sidebar route={route} onRoute={setRoute} />
      <div className="flex min-w-0 flex-1 flex-col">
        <window.TopNav onRoute={setRoute} theme={theme} onToggleTheme={() => setTheme(theme === "dark" ? "light" : "dark")} />
        <main className="min-w-0 flex-1 overflow-y-auto">{view}</main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
