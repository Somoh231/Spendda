<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card" style="background:#f5f7fb">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div style="padding:16px;background:#fff;border:1px solid rgba(15,23,42,0.06);border-radius:16px;box-shadow:0 1px 0 rgba(15,23,42,0.04),0 14px 40px -12px rgba(15,23,42,0.10)">
      <div style="font:600 13px Geist">Card · default</div>
      <div class="muted" style="margin-top:4px;font-size:12px">rounded-2xl / border/60 / shadow-ds-card</div>
      <div style="margin-top:12px;height:6px;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#22c55e);width:70%"></div>
    </div>
    <div style="padding:16px;background:#fff;border:1px solid rgba(59,130,246,0.25);border-radius:16px;box-shadow:0 1px 0 rgba(15,23,42,0.05),0 20px 50px -12px rgba(37,99,235,0.20);transform:translateY(-2px)">
      <div style="font:600 13px Geist">Card · hover lift</div>
      <div class="muted" style="margin-top:4px;font-size:12px">-translate-y-0.5 + blue-tinted glow</div>
      <div style="margin-top:12px;height:6px;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#22c55e);width:85%"></div>
    </div>
  </div>
</div>
</body></html>
