<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div>
      <div style="height:56px;border-radius:10px;background:hsl(142 71% 41%)"></div>
      <div style="margin-top:8px;font-weight:600;font-size:13px">Success</div>
      <div class="mono muted" style="font-size:11px">142 71% 41%</div>
    </div>
    <div>
      <div style="height:56px;border-radius:10px;background:hsl(217 91% 53%)"></div>
      <div style="margin-top:8px;font-weight:600;font-size:13px">Info</div>
      <div class="mono muted" style="font-size:11px">217 91% 53%</div>
    </div>
    <div>
      <div style="height:56px;border-radius:10px;background:hsl(38 92% 50%)"></div>
      <div style="margin-top:8px;font-weight:600;font-size:13px">Warning</div>
      <div class="mono muted" style="font-size:11px">38 92% 50%</div>
    </div>
    <div>
      <div style="height:56px;border-radius:10px;background:hsl(0 72% 51%)"></div>
      <div style="margin-top:8px;font-weight:600;font-size:13px">Critical</div>
      <div class="mono muted" style="font-size:11px">0 72% 51%</div>
    </div>
  </div>
  <div class="muted" style="margin-top:12px;font-size:11px">Each pairs with a <span class="mono">--*-foreground</span> token for legible text.</div>
</div>
</body></html>
